<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仓库信息 - WebsiteStatistics</title>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
<link rel="stylesheet" href="/style.css">

  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>

  
  

  <link rel="stylesheet" href="/tailwind.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/EndlessPixel/Tip@main/1.0/tip.css"></head>
<body class="bg-gray-100 dark:bg-neutral-950 text-gray-900 dark:text-white">
  
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <h1 class="text-2xl font-bold mb-6 flex items-center gap-2"><i data-feather="github" class="w-7 h-7"></i>仓库信息</h1>
    
    <div id="repoStats" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="bg-white dark:bg-neutral-900 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-neutral-800">
        <div class="text-center">
          <div class="text-4xl mb-2">⭐</div>
          <div id="starsCount" class="text-3xl font-bold text-gray-900 dark:text-white">-</div>
          <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">Stars</div>
        </div>
      </div>
      <div class="bg-white dark:bg-neutral-900 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-neutral-800">
        <div class="text-center">
          <div class="text-4xl mb-2">👁️</div>
          <div id="watchersCount" class="text-3xl font-bold text-gray-900 dark:text-white">-</div>
          <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">Watchers</div>
        </div>
      </div>
      <div class="bg-white dark:bg-neutral-900 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-neutral-800">
        <div class="text-center">
          <div class="text-4xl mb-2">🍴</div>
          <div id="forksCount" class="text-3xl font-bold text-gray-900 dark:text-white">-</div>
          <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">Forks</div>
        </div>
      </div>
    </div>
    
    <div id="errorMsg" class="hidden bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl p-6 mb-8">
      <div class="flex items-center gap-3 text-red-600 dark:text-red-400">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
        <span class="font-medium">无法连接 GitHub</span>
      </div>
      <p class="text-sm text-red-500 dark:text-red-400 mt-2">请检查网络连接，其他功能不受影响。</p>
    </div>
    
    <div class="bg-white dark:bg-neutral-900 rounded-xl shadow-sm border border-gray-200 dark:border-neutral-800 p-6 mb-6">
      <div class="flex flex-wrap items-center justify-between gap-4 mb-4">
        <h2 class="text-lg font-semibold flex items-center gap-2"><i data-feather="link" class="w-5 h-5"></i>仓库链接</h2>
        <button onclick="loadRepoInfo()" class="inline-flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors">
          <i data-feather="refresh-cw" class="w-4 h-4"></i>刷新
        </button>
      </div>
      <div class="flex flex-wrap gap-3">
        <a href="https://github.com/EndlessPixel/website-statistics" target="_blank" class="inline-flex items-center gap-2 px-4 py-2 bg-gray-100 dark:bg-neutral-800 hover:bg-gray-200 dark:hover:bg-neutral-700 text-gray-700 dark:text-gray-300 rounded-lg text-sm font-medium transition-colors">
          <i data-feather="github" class="w-4 h-4"></i>GitHub 仓库
        </a>
        <a href="https://github.com/EndlessPixel/website-statistics.git" target="_blank" class="inline-flex items-center gap-2 px-4 py-2 bg-gray-100 dark:bg-neutral-800 hover:bg-gray-200 dark:hover:bg-neutral-700 text-gray-700 dark:text-gray-300 rounded-lg text-sm font-medium transition-colors">
          <i data-feather="link" class="w-4 h-4"></i>克隆地址
        </a>
      </div>
    </div>
    
    <div class="bg-white dark:bg-neutral-900 rounded-xl shadow-sm border border-gray-200 dark:border-neutral-800 p-6">
      <h2 class="text-lg font-semibold mb-4 flex items-center gap-2"><i data-feather="github" class="w-5 h-5"></i>贡献者</h2>
      <div id="contributorsList" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
        <div class="text-center text-gray-500 dark:text-gray-400 col-span-full py-8">加载中...</div>
      </div>
    </div>
  </main>
  
  <script src="common.js"></script>
  <script>
    const REPO_URL = 'https://api.github.com/repos/EndlessPixel/website-statistics';
    let githubToken = '';
    
    document.addEventListener('DOMContentLoaded', function() {
      AppUtils.initTheme();
      AppUtils.renderNavigationBar();
      AppUtils.renderFooter();
      loadSettingsAndRepoInfo();
      if (window.feather) feather.replace();
    });
    
    async function loadSettingsAndRepoInfo() {
      try {
        const response = await fetch('/api/keys');
        const data = await response.json();
        if (data.code === 0 && data.data?.github?.enabled) {
          githubToken = data.data.github.accessToken;
        }
      } catch (error) {
        console.log('未加载到 GitHub Token，将使用未认证请求');
      }
      loadRepoInfo();
    }
    
    async function loadRepoInfo() {
      try {
        const headers = {};
        if (githubToken) {
          headers['Authorization'] = `token ${githubToken}`;
        }
        
        const [repoResponse, contributorsResponse] = await Promise.all([
          fetch(REPO_URL, { headers }),
          fetch(`${REPO_URL}/contributors`, { headers })
        ]);
        
        if (!repoResponse.ok || !contributorsResponse.ok) {
          throw new Error('GitHub API 请求失败');
        }
        
        const repoData = await repoResponse.json();
        const contributors = await contributorsResponse.json();
        
        document.getElementById('starsCount').textContent = repoData.stargazers_count || 0;
        document.getElementById('watchersCount').textContent = repoData.watchers_count || 0;
        document.getElementById('forksCount').textContent = repoData.forks_count || 0;
        renderContributors(contributors || []);
      } catch (error) {
        console.error('获取仓库信息失败:', error);
        document.getElementById('errorMsg').classList.remove('hidden');
        document.getElementById('contributorsList').innerHTML = '<div class="text-center text-gray-500 dark:text-gray-400 col-span-full py-8">加载失败</div>';
      }
    }
    
    function renderContributors(contributors) {
      const container = document.getElementById('contributorsList');
      if (!Array.isArray(contributors) || contributors.length === 0) {
        container.innerHTML = '<div class="text-center text-gray-500 dark:text-gray-400 col-span-full py-8">暂无贡献者</div>';
        return;
      }
      
      container.innerHTML = contributors.map(c => `
        <div class="flex flex-col items-center p-3 rounded-lg hover:bg-gray-50 dark:hover:bg-neutral-800 transition-colors">
          <img src="${c.avatar_url}" alt="${c.login}" class="w-12 h-12 rounded-full mb-2">
          <span class="text-sm font-medium text-gray-900 dark:text-white truncate max-w-full">${c.login}</span>
          <span class="text-xs text-gray-500 dark:text-gray-400">${c.contributions} commits</span>
        </div>
      `).join('');
    }
  </script>
  <script src="https://cdn.jsdelivr.net/gh/EndlessPixel/Tip@main/1.0/tip.js"></script>
  <script>document.addEventListener('DOMContentLoaded', function() { if (window.feather) feather.replace(); });</script>
</body>
</html>
