<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>数据概览 - 网页访问统计</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()">
    <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"></circle>
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
    </svg>
    <span id="themeText">深色模式</span>
  </button>
  
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>统计管理</h2>
    </div>
    <div class="sidebar-nav">
      <button class="nav-item active" onclick="location.href='/overview'">数据概览</button>
      <button class="nav-item" onclick="location.href='/charts'">图表分析</button>
      <button class="nav-item" onclick="location.href='/records'">访问记录</button>
      <button class="nav-item" onclick="location.href='/logs'">操作日志</button>
      <button class="nav-item" onclick="location.href='/api-docs'">API文档</button>
    </div>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="location.href='/logout'">退出登录</button>
    </div>
  </div>
  
  <div class="main-content">
    <h1>数据概览</h1>
    <div class="overview-cards">
      <div class="card">
        <div class="card-icon">📊</div>
        <div class="card-content">
          <div class="card-value" id="totalRecords">0</div>
          <div class="card-label">总访问次数</div>
        </div>
      </div>
      <div class="card">
        <div class="card-icon">🌐</div>
        <div class="card-content">
          <div class="card-value" id="uniqueIps">0</div>
          <div class="card-label">独立IP数</div>
        </div>
      </div>
      <div class="card">
        <div class="card-icon">🔗</div>
        <div class="card-content">
          <div class="card-value" id="uniqueUrls">0</div>
          <div class="card-label">访问域名数</div>
        </div>
      </div>
      <div class="card">
        <div class="card-icon">📅</div>
        <div class="card-content">
          <div class="card-value" id="activeDays">0</div>
          <div class="card-label">活跃天数</div>
        </div>
      </div>
    </div>
    <div class="quick-stats">
      <h3>今日访问统计</h3>
      <div class="stats-row">
        <span class="stats-label">今日访问次数:</span>
        <span class="stats-value" id="todayCount">0</span>
      </div>
      <div class="stats-row">
        <span class="stats-label">今日独立IP:</span>
        <span class="stats-value" id="todayIps">0</span>
      </div>
    </div>
    
    <div class="auto-refresh-bar">
      <label><input type="checkbox" id="autoRefresh" checked> 自动刷新</label>
      <select id="refreshInterval">
        <option value="5">5秒</option>
        <option value="10" selected>10秒</option>
        <option value="30">30秒</option>
        <option value="60">60秒</option>
      </select>
      <span class="refresh-status" id="refreshStatus"></span>
    </div>
  </div>
  
  <script>
    // 主题切换
    function toggleTheme() {
      const body = document.body;
      const isDark = body.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      updateThemeUI(isDark);
    }
    
    function updateThemeUI(isDark) {
      const icon = document.getElementById('themeIcon');
      const text = document.getElementById('themeText');
      
      if (isDark) {
        icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
        text.textContent = '浅色模式';
      } else {
        icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>';
        text.textContent = '深色模式';
      }
    }
    
    function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);
      
      if (isDark) {
        document.body.classList.add('dark');
      }
      updateThemeUI(isDark);
    }
    
    let refreshTimer = null;
    
    function loadOverview() {
      fetch('/api/overview')
        .then(response => response.json())
        .then(data => {
          if (data.code === 0) {
            document.getElementById('totalRecords').textContent = data.data.totalRecords;
            document.getElementById('uniqueIps').textContent = data.data.uniqueIps;
            document.getElementById('uniqueUrls').textContent = data.data.uniqueUrls;
            document.getElementById('activeDays').textContent = data.data.activeDays;
            document.getElementById('todayCount').textContent = data.data.todayCount;
            document.getElementById('todayIps').textContent = data.data.todayIps;
            document.getElementById('refreshStatus').textContent = '更新于 ' + new Date().toLocaleTimeString();
          } else {
            window.location.href = '/login';
          }
        })
        .catch(error => {
          console.error('获取概览数据失败:', error);
          window.location.href = '/login';
        });
    }
    
    function setupAutoRefresh() {
      const autoRefresh = document.getElementById('autoRefresh').checked;
      const interval = parseInt(document.getElementById('refreshInterval').value) * 1000;
      
      if (refreshTimer) {
        clearInterval(refreshTimer);
        refreshTimer = null;
      }
      
      if (autoRefresh) {
        refreshTimer = setInterval(loadOverview, interval);
      }
    }
    
    document.getElementById('autoRefresh').addEventListener('change', setupAutoRefresh);
    document.getElementById('refreshInterval').addEventListener('change', setupAutoRefresh);
    
    document.addEventListener('DOMContentLoaded', function() {
      initTheme();
      loadOverview();
      setupAutoRefresh();
    });
  </script>
</body>
</html>
