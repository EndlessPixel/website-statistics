<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据概览 - 网页访问统计</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            accent: '#007aff',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif; }
    .nav-active {
      background: rgba(0, 122, 255, 0.1);
      color: #007aff;
    }
    .dark .nav-active {
      background: rgba(10, 132, 255, 0.15);
      color: #0a84ff;
    }
  </style>
</head>
<body class="bg-gray-100 dark:bg-neutral-950 text-gray-900 dark:text-white min-h-screen flex transition-colors">
  
  <!-- 主题切换按钮 -->
  <button onclick="AppUtils.toggleTheme()" class="fixed top-4 right-4 z-50 p-2.5 rounded-xl bg-white dark:bg-neutral-800 shadow-lg hover:shadow-xl transition-all border border-gray-200 dark:border-neutral-700">
    <svg id="themeIcon" class="w-5 h-5 text-gray-600 dark:text-gray-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"></circle>
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
    </svg>
  </button>
  
  <!-- 侧边栏 -->
  <aside class="w-60 bg-white dark:bg-neutral-900 border-r border-gray-200 dark:border-neutral-800 flex flex-col h-screen sticky top-0">
    <div class="p-5 border-b border-gray-200 dark:border-neutral-800">
      <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100">统计管理</h2>
    </div>
    <nav class="flex-1 p-3 space-y-1">
      <a href="/overview" class="nav-item nav-active block px-4 py-2.5 rounded-lg text-sm font-medium transition-colors">数据概览</a>
      <a href="/charts" class="nav-item block px-4 py-2.5 rounded-lg text-sm font-medium transition-colors text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-neutral-800">图表分析</a>
      <a href="/records" class="nav-item block px-4 py-2.5 rounded-lg text-sm font-medium transition-colors text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-neutral-800">访问记录</a>
      <a href="/logs" class="nav-item block px-4 py-2.5 rounded-lg text-sm font-medium transition-colors text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-neutral-800">操作日志</a>
      <a href="/api-docs" class="nav-item block px-4 py-2.5 rounded-lg text-sm font-medium transition-colors text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-neutral-800">API文档</a>
    </nav>
    <div class="p-3 border-t border-gray-200 dark:border-neutral-800">
      <a href="/logout" class="block px-4 py-2.5 text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors">退出登录</a>
    </div>
  </aside>
  
  <!-- 主内容区 -->
  <main class="flex-1 p-8">
    <h1 class="text-2xl font-bold mb-6 text-gray-900 dark:text-white">数据概览</h1>
    
    <!-- 统计卡片 -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
      <div class="bg-white dark:bg-neutral-900 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-neutral-800 transition-colors">
        <div class="flex items-center gap-4">
          <span class="text-3xl">📊</span>
          <div>
            <div class="text-2xl font-bold text-gray-900 dark:text-white" id="totalRecords">-</div>
            <div class="text-sm text-gray-500 dark:text-gray-400">总访问次数</div>
          </div>
        </div>
      </div>
      <div class="bg-white dark:bg-neutral-900 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-neutral-800 transition-colors">
        <div class="flex items-center gap-4">
          <span class="text-3xl">🌐</span>
          <div>
            <div class="text-2xl font-bold text-gray-900 dark:text-white" id="uniqueIps">-</div>
            <div class="text-sm text-gray-500 dark:text-gray-400">独立IP数</div>
          </div>
        </div>
      </div>
      <div class="bg-white dark:bg-neutral-900 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-neutral-800 transition-colors">
        <div class="flex items-center gap-4">
          <span class="text-3xl">🔗</span>
          <div>
            <div class="text-2xl font-bold text-gray-900 dark:text-white" id="uniqueUrls">-</div>
            <div class="text-sm text-gray-500 dark:text-gray-400">访问域名数</div>
          </div>
        </div>
      </div>
      <div class="bg-white dark:bg-neutral-900 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-neutral-800 transition-colors">
        <div class="flex items-center gap-4">
          <span class="text-3xl">📅</span>
          <div>
            <div class="text-2xl font-bold text-gray-900 dark:text-white" id="activeDays">-</div>
            <div class="text-sm text-gray-500 dark:text-gray-400">活跃天数</div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 今日统计 -->
    <div class="bg-white dark:bg-neutral-900 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-neutral-800 mb-6 transition-colors">
      <h3 class="text-lg font-semibold mb-4 text-gray-900 dark:text-white">今日访问统计</h3>
      <div class="space-y-3">
        <div class="flex items-center justify-between">
          <span class="text-gray-600 dark:text-gray-400">今日访问次数:</span>
          <span class="font-semibold text-blue-600 dark:text-blue-400" id="todayCount">-</span>
        </div>
        <div class="flex items-center justify-between">
          <span class="text-gray-600 dark:text-gray-400">今日独立IP:</span>
          <span class="font-semibold text-blue-600 dark:text-blue-400" id="todayIps">-</span>
        </div>
      </div>
    </div>
    
    <!-- 自动刷新 -->
    <div class="bg-white dark:bg-neutral-900 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-neutral-800 flex items-center gap-4 transition-colors">
      <label class="flex items-center gap-2 cursor-pointer text-gray-700 dark:text-gray-300">
        <input type="checkbox" id="autoRefresh" checked class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500 dark:border-gray-600">
        <span class="text-sm">自动刷新</span>
      </label>
      <select id="refreshInterval" class="px-3 py-1.5 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-neutral-800 text-sm text-gray-700 dark:text-gray-300">
        <option value="5">5秒</option>
        <option value="10" selected>10秒</option>
        <option value="30">30秒</option>
        <option value="60">60秒</option>
      </select>
      <span class="text-sm text-gray-500" id="refreshStatus"></span>
    </div>
  </main>
  
  <script src="common.js"></script>
  <script>
    function loadOverview() {
      fetch('/api/overview')
        .then(response => response.json())
        .then(data => {
          if (data.code === 0) {
            document.getElementById('totalRecords').textContent = data.data.totalRecords || 0;
            document.getElementById('uniqueIps').textContent = data.data.uniqueIps || 0;
            document.getElementById('uniqueUrls').textContent = data.data.uniqueUrls || 0;
            document.getElementById('activeDays').textContent = data.data.activeDays || 0;
            document.getElementById('todayCount').textContent = data.data.todayCount || 0;
            document.getElementById('todayIps').textContent = data.data.todayIps || 0;
            document.getElementById('refreshStatus').textContent = '更新于 ' + new Date().toLocaleTimeString();
          } else {
            window.location.href = '/login';
          }
        })
        .catch(error => {
          console.error('获取概览数据失败:', error);
          window.location.href = '/login';
        });
    }
    
    document.addEventListener('DOMContentLoaded', function() {
      AppUtils.initTheme();
      AppUtils.renderNavigation();
      loadOverview();
      AppUtils.setupAutoRefresh(loadOverview);
    });
  </script>
</body>
</html>
