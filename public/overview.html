<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据概览 - WebsiteStatistics</title>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-gray-100 dark:bg-neutral-950 text-gray-900 dark:text-white">
  
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <h1 class="text-2xl font-bold mb-6">数据概览</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
      <div class="bg-white dark:bg-neutral-900 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-neutral-800">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-gray-500 dark:text-gray-400">总访问量</p>
            <p id="totalVisits" class="text-3xl font-bold mt-2 text-gray-900 dark:text-white">-</p>
          </div>
          <div class="w-12 h-12 bg-blue-100 dark:bg-blue-900/30 rounded-xl flex items-center justify-center">
            <span class="text-2xl">📊</span>
          </div>
        </div>
      </div>
      
      <div class="bg-white dark:bg-neutral-900 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-neutral-800">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-gray-500 dark:text-gray-400">独立IP数</p>
            <p id="uniqueIps" class="text-3xl font-bold mt-2 text-gray-900 dark:text-white">-</p>
          </div>
          <div class="w-12 h-12 bg-green-100 dark:bg-green-900/30 rounded-xl flex items-center justify-center">
            <span class="text-2xl">🌐</span>
          </div>
        </div>
      </div>
      
      <div class="bg-white dark:bg-neutral-900 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-neutral-800">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-gray-500 dark:text-gray-400">今日访问</p>
            <p id="todayVisits" class="text-3xl font-bold mt-2 text-gray-900 dark:text-white">-</p>
          </div>
          <div class="w-12 h-12 bg-purple-100 dark:bg-purple-900/30 rounded-xl flex items-center justify-center">
            <span class="text-2xl">📈</span>
          </div>
        </div>
      </div>
      
      <div class="bg-white dark:bg-neutral-900 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-neutral-800">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-gray-500 dark:text-gray-400">热门页面</p>
            <p id="topPage" class="text-lg font-bold mt-2 text-gray-900 dark:text-white truncate max-w-[150px]">-</p>
          </div>
          <div class="w-12 h-12 bg-orange-100 dark:bg-orange-900/30 rounded-xl flex items-center justify-center">
            <span class="text-2xl">🔥</span>
          </div>
        </div>
      </div>
    </div>
    
    <div class="bg-white dark:bg-neutral-900 rounded-xl shadow-sm border border-gray-200 dark:border-neutral-800 p-6">
      <h2 class="text-lg font-semibold mb-4">访问趋势</h2>
      <div id="trendChart" class="h-64"></div>
    </div>
  </main>
  
  <script src="common.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      AppUtils.initTheme();
      AppUtils.renderNavigationBar();
      AppUtils.renderFooter();
      loadOverview();
    });
    
    async function loadOverview() {
      try {
        const response = await fetch('/api/overview');
        const data = await response.json();
        
        if (data.code === 0 && data.data) {
          document.getElementById('totalVisits').textContent = data.data.totalRecords || 0;
          document.getElementById('uniqueIps').textContent = data.data.uniqueIps || 0;
          document.getElementById('todayVisits').textContent = data.data.todayCount || 0;
          document.getElementById('topPage').textContent = '-';
        }
      } catch (error) {
        console.error('获取统计数据失败:', error);
      }
      await loadTrendChart();
    }
    
    async function loadTrendChart() {
      try {
        const response = await fetch('/api/stats');
        const data = await response.json();
        
        if (data.code === 0 && data.data) {
          renderTrendChart(data.data.dateTrend || []);
        }
      } catch (error) {
        console.error('获取趋势数据失败:', error);
      }
    }
    
    function renderTrendChart(trendData) {
      const chart = echarts.init(document.getElementById('trendChart'));
      const isDark = document.documentElement.classList.contains('dark');
      
      const option = {
        backgroundColor: 'transparent',
        grid: { top: 20, right: 20, bottom: 30, left: 50 },
        xAxis: {
          type: 'category',
          data: trendData.map(item => item.date),
          axisLine: { lineStyle: { color: isDark ? '#4b5563' : '#e5e7eb' } },
          axisLabel: { color: isDark ? '#9ca3af' : '#6b7280' }
        },
        yAxis: {
          type: 'value',
          axisLine: { lineStyle: { color: isDark ? '#4b5563' : '#e5e7eb' } },
          axisLabel: { color: isDark ? '#9ca3af' : '#6b7280' },
          splitLine: { lineStyle: { color: isDark ? '#374151' : '#f3f4f6' } }
        },
        series: [{
          type: 'line',
          data: trendData.map(item => item.count),
          smooth: true,
          lineStyle: { color: '#3b82f6', width: 3 },
          areaStyle: {
            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
              { offset: 0, color: 'rgba(59, 130, 246, 0.3)' },
              { offset: 1, color: 'rgba(59, 130, 246, 0.05)' }
            ])
          },
          itemStyle: { color: '#3b82f6' }
        }]
      };
      
      chart.setOption(option);
      
      window.addEventListener('resize', () => chart.resize());
    }
  </script>
</body>
</html>
