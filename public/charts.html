<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>图表分析 - 网页访问统计</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
  <button class="theme-toggle" onclick="AppUtils.toggleTheme(); if(chartInstance) chartInstance.resize();">
    <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"></circle>
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
    </svg>
    <span id="themeText">深色模式</span>
  </button>
  
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>统计管理</h2>
    </div>
    <div class="sidebar-nav">
      <button class="nav-item" onclick="location.href='/overview'">数据概览</button>
      <button class="nav-item active" onclick="location.href='/charts'">图表分析</button>
      <button class="nav-item" onclick="location.href='/records'">访问记录</button>
      <button class="nav-item" onclick="location.href='/logs'">操作日志</button>
      <button class="nav-item" onclick="location.href='/api-docs'">API文档</button>
    </div>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="location.href='/logout'">退出登录</button>
    </div>
  </div>
  
  <div class="main-content">
    <h1>图表分析</h1>
    <div class="chart-tabs">
      <div class="tab-header">
        <button class="tab-btn active" onclick="switchChart('pie')">IP来源分布</button>
        <button class="tab-btn" onclick="switchChart('bar')">访问时间分布</button>
        <button class="tab-btn" onclick="switchChart('line')">访问趋势</button>
      </div>
      <div class="tab-content">
        <div id="chartContainer" class="chart"></div>
      </div>
    </div>
  </div>
  
  <script src="common.js"></script>
  <script>
    let chartInstance = null;
    let currentChartType = 'pie';
    let statsData = null;
    
    function loadStats() {
      fetch('/api/getStats')
        .then(response => response.json())
        .then(data => {
          if (data.code === 0) {
            statsData = data.data;
            renderChart();
          } else {
            window.location.href = '/login';
          }
        })
        .catch(error => {
          console.error('获取统计数据失败:', error);
          window.location.href = '/login';
        });
    }
    
    function switchChart(type) {
      currentChartType = type;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      renderChart();
    }
    
    function renderChart() {
      if (!statsData) return;
      
      if (chartInstance) {
        chartInstance.dispose();
      }
      
      chartInstance = echarts.init(document.getElementById('chartContainer'));
      
      switch(currentChartType) {
        case 'pie':
          renderIpPieChart();
          break;
        case 'bar':
          renderHourBarChart();
          break;
        case 'line':
          renderTrendLineChart();
          break;
      }
      
      window.addEventListener('resize', function() {
        chartInstance && chartInstance.resize();
      });
    }
    
    function renderIpPieChart() {
      const data = statsData.ipDistribution;
      const option = {
        tooltip: { trigger: 'item', formatter: '{b}: {c}次 ({d}%)' },
        legend: { orient: 'vertical', right: 20, top: 'center', itemWidth: 12, itemHeight: 12, textStyle: { fontSize: 12 } },
        series: [{
          name: 'IP来源',
          type: 'pie',
          radius: ['40%', '70%'],
          avoidLabelOverlap: false,
          itemStyle: { borderRadius: 4, borderColor: '#fff', borderWidth: 2 },
          label: { show: false, position: 'center' },
          emphasis: { label: { show: true, fontSize: 16, fontWeight: 'bold' } },
          labelLine: { show: false },
          data: data.length > 0 ? data : [{ name: '暂无数据', value: 1 }],
          color: generateColors(data.length)
        }]
      };
      chartInstance.setOption(option);
    }
    
    function renderHourBarChart() {
      const data = statsData.hourDistribution;
      const hours = Array.from({ length: 24 }, (_, i) => `${i.toString().padStart(2, '0')}:00`);
      const counts = new Array(24).fill(0);
      data.forEach(item => {
        const hour = parseInt(item.hour);
        if (hour >= 0 && hour < 24) counts[hour] = item.count;
      });
      
      const option = {
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, formatter: '{b}: {c}次' },
        grid: { left: '3%', right: '4%', bottom: '3%', top: '10%', containLabel: true },
        xAxis: { type: 'category', data: hours, axisLabel: { interval: 2, fontSize: 11 }, axisLine: { lineStyle: { color: '#ddd' } } },
        yAxis: { type: 'value', name: '访问次数', nameTextStyle: { fontSize: 12 }, axisLine: { show: false }, axisTick: { show: false }, splitLine: { lineStyle: { type: 'dashed', color: '#eee' } } },
        series: [{
          name: '访问次数',
          type: 'bar',
          data: counts,
          barWidth: '60%',
          itemStyle: {
            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: '#007bff' }, { offset: 1, color: '#0056b3' }]),
            borderRadius: [4, 4, 0, 0]
          }
        }]
      };
      chartInstance.setOption(option);
    }
    
    function renderTrendLineChart() {
      const data = statsData.dateTrend;
      const dates = data.map(item => item.date);
      const counts = data.map(item => item.count);
      
      const option = {
        tooltip: { trigger: 'axis', formatter: '{b}: {c}次' },
        grid: { left: '3%', right: '4%', bottom: '15%', top: '10%', containLabel: true },
        xAxis: { type: 'category', boundaryGap: false, data: dates.length > 0 ? dates : ['暂无数据'], axisLabel: { fontSize: 11, rotate: dates.length > 10 ? 45 : 0 }, axisLine: { lineStyle: { color: '#ddd' } } },
        yAxis: { type: 'value', name: '访问次数', nameTextStyle: { fontSize: 12 }, axisLine: { show: false }, axisTick: { show: false }, splitLine: { lineStyle: { type: 'dashed', color: '#eee' } } },
        series: [{
          name: '访问次数',
          type: 'line',
          smooth: true,
          symbol: 'circle',
          symbolSize: 6,
          data: counts.length > 0 ? counts : [0],
          lineStyle: { width: 3, color: '#007bff' },
          itemStyle: { color: '#007bff' },
          areaStyle: {
            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: 'rgba(0, 123, 255, 0.3)' }, { offset: 1, color: 'rgba(0, 123, 255, 0.05)' }])
          }
        }]
      };
      chartInstance.setOption(option);
    }
    
    function generateColors(count) {
      const hueStep = 360 / Math.max(count, 1);
      return Array.from({ length: count }, (_, i) => `hsl(${(i * hueStep) % 360}, 70%, 55%)`);
    }
    
    document.addEventListener('DOMContentLoaded', function() {
      AppUtils.initTheme();
      AppUtils.renderNavigation();
      loadStats();
    });
  </script>
</body>
</html>
