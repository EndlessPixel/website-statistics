<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图表分析 - WebsiteStatistics</title>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-gray-100 dark:bg-neutral-950 text-gray-900 dark:text-white">
  
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <h1 class="text-2xl font-bold mb-6">图表分析</h1>
    
    <div class="bg-white dark:bg-neutral-900 rounded-xl shadow-sm border border-gray-200 dark:border-neutral-800 p-6 mb-6">
      <div class="flex flex-wrap gap-2 mb-6">
        <button onclick="switchChart('pie')" class="chart-tab-active px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium">饼图 - IP来源</button>
        <button onclick="switchChart('bar')" class="chart-tab px-4 py-2 bg-gray-100 dark:bg-neutral-800 hover:bg-gray-200 dark:hover:bg-neutral-700 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-300">柱状图 - 访问时间分布</button>
        <button onclick="switchChart('line')" class="chart-tab px-4 py-2 bg-gray-100 dark:bg-neutral-800 hover:bg-gray-200 dark:hover:bg-neutral-700 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-300">折线图 - 访问趋势</button>
      </div>
      <div id="chartContainer" class="h-80"></div>
    </div>
  </main>
  
  <script src="common.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script>
    let currentChart = null;
    let chartType = 'pie';
    
    document.addEventListener('DOMContentLoaded', function() {
      AppUtils.initTheme();
      AppUtils.renderNavigationBar();
      AppUtils.renderFooter();
      loadStats();
    });
    
    async function loadStats() {
      try {
        const response = await fetch('/api/stats');
        const data = await response.json();
        
        if (data.code === 0 && data.data) {
          renderChart(chartType, data.data);
        }
      } catch (error) {
        console.error('获取统计数据失败:', error);
      }
    }
    
    function switchChart(type) {
      chartType = type;
      
      document.querySelectorAll('.chart-tab, .chart-tab-active').forEach(btn => {
        btn.classList.remove('chart-tab-active', 'bg-blue-600', 'text-white');
        btn.classList.add('chart-tab', 'bg-gray-100', 'dark:bg-neutral-800', 'text-gray-700', 'dark:text-gray-300', 'hover:bg-gray-200', 'dark:hover:bg-neutral-700');
      });
      
      event.target.classList.remove('chart-tab', 'bg-gray-100', 'dark:bg-neutral-800', 'text-gray-700', 'dark:text-gray-300', 'hover:bg-gray-200', 'dark:hover:bg-neutral-700');
      event.target.classList.add('chart-tab-active', 'bg-blue-600', 'text-white');
      
      loadStats();
    }
    
    function renderChart(type, data) {
      const container = document.getElementById('chartContainer');
      if (currentChart) {
        currentChart.dispose();
      }
      currentChart = echarts.init(container);
      
      const isDark = document.documentElement.classList.contains('dark');
      const textColor = isDark ? '#9ca3af' : '#6b7280';
      const lineColor = isDark ? '#4b5563' : '#e5e7eb';
      const splitLineColor = isDark ? '#374151' : '#f3f4f6';
      
      let option;
      
      switch(type) {
        case 'pie':
          const ipData = data.ipDistribution || [];
          option = {
            backgroundColor: 'transparent',
            tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
            legend: { 
              bottom: 10, 
              textStyle: { color: textColor },
              data: ipData.map(item => item.name)
            },
            series: [{
              type: 'pie',
              radius: ['40%', '70%'],
              center: ['50%', '40%'],
              avoidLabelOverlap: false,
              itemStyle: { borderRadius: 10, borderColor: isDark ? '#1f2937' : '#fff', borderWidth: 2 },
              label: { show: true, color: textColor },
              emphasis: { label: { show: true, fontSize: 14, fontWeight: 'bold' } },
              labelLine: { show: true },
              data: ipData.map((item, idx) => ({
                value: item.value,
                name: item.name,
                itemStyle: { color: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#84cc16'][idx % 8] }
              }))
            }]
          };
          break;
          
        case 'bar':
          const hourlyData = data.hourDistribution || [];
          option = {
            backgroundColor: 'transparent',
            grid: { top: 20, right: 20, bottom: 40, left: 60 },
            xAxis: {
              type: 'category',
              data: hourlyData.map(item => item.hour),
              axisLine: { lineStyle: { color: lineColor } },
              axisLabel: { color: textColor, rotate: 45 }
            },
            yAxis: {
              type: 'value',
              axisLine: { lineStyle: { color: lineColor } },
              axisLabel: { color: textColor },
              splitLine: { lineStyle: { color: splitLineColor } }
            },
            series: [{
              type: 'bar',
              data: hourlyData.map(item => item.count),
              itemStyle: { borderRadius: [6, 6, 0, 0], color: '#3b82f6' }
            }]
          };
          break;
          
        case 'line':
          const trendData = data.dateTrend || [];
          option = {
            backgroundColor: 'transparent',
            grid: { top: 20, right: 20, bottom: 40, left: 60 },
            xAxis: {
              type: 'category',
              data: trendData.map(item => item.date),
              axisLine: { lineStyle: { color: lineColor } },
              axisLabel: { color: textColor, rotate: 45 }
            },
            yAxis: {
              type: 'value',
              axisLine: { lineStyle: { color: lineColor } },
              axisLabel: { color: textColor },
              splitLine: { lineStyle: { color: splitLineColor } }
            },
            series: [{
              type: 'line',
              data: trendData.map(item => item.count),
              smooth: true,
              lineStyle: { color: '#3b82f6', width: 3 },
              areaStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                  { offset: 0, color: 'rgba(59, 130, 246, 0.3)' },
                  { offset: 1, color: 'rgba(59, 130, 246, 0.05)' }
                ])
              }
            }]
          };
          break;
      }
      
      currentChart.setOption(option);
      window.addEventListener('resize', () => currentChart.resize());
    }
  </script>
</body>
</html>
