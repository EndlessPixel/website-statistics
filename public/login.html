<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>登录 - 网页访问统计系统</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <button class="theme-toggle" onclick="toggleTheme()">
    <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"></circle>
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
    </svg>
    <span id="themeText">深色模式</span>
  </button>
  
  <div class="login-box">
    <h2>网页访问统计系统</h2>
    <p>请输入访问密钥</p>
    <div class="login-error" id="error"></div>
    <form id="loginForm">
      <input type="text" id="key" name="key" placeholder="请输入密钥" required>
      <span class="error-message">登录密钥在服务器控制台查看</span>
      <button type="submit">登录</button>
    </form>
  </div>
  
  <script>
    // 主题切换
    function toggleTheme() {
      const body = document.body;
      const isDark = body.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      updateThemeUI(isDark);
    }
    
    function updateThemeUI(isDark) {
      const icon = document.getElementById('themeIcon');
      const text = document.getElementById('themeText');
      
      if (isDark) {
        icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
        text.textContent = '浅色模式';
      } else {
        icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>';
        text.textContent = '深色模式';
      }
    }
    
    // 初始化主题
    function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);
      
      if (isDark) {
        document.body.classList.add('dark');
      }
      updateThemeUI(isDark);
    }
    
    // 登录表单处理
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const key = document.getElementById('key').value;
      if (key) {
        window.location.href = '/login?key=' + encodeURIComponent(key);
      }
    });
    
    // 检查错误参数
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('err') === '1') {
      const errorEl = document.getElementById('error');
      errorEl.textContent = '密钥错误，请重新输入';
      errorEl.classList.add('show');
    }
    
    // 初始化
    initTheme();
  </script>
</body>
</html>
