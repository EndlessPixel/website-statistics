<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>访问记录 - 网页访问统计</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button class="theme-toggle" onclick="AppUtils.toggleTheme()">
    <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"></circle>
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
    </svg>
    <span id="themeText">深色模式</span>
  </button>
  
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>统计管理</h2>
    </div>
    <div class="sidebar-nav">
      <button class="nav-item" onclick="location.href='/overview'">数据概览</button>
      <button class="nav-item" onclick="location.href='/charts'">图表分析</button>
      <button class="nav-item active" onclick="location.href='/records'">访问记录</button>
      <button class="nav-item" onclick="location.href='/logs'">操作日志</button>
      <button class="nav-item" onclick="location.href='/api-docs'">API文档</button>
    </div>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="location.href='/logout'">退出登录</button>
    </div>
  </div>
  
  <div class="main-content">
    <h1>访问记录</h1>
    <div class="count" id="count">总记录数: 0</div>
    
    <div class="batch-actions">
      <label><input type="checkbox" id="selectAll" onclick="AppUtils.toggleSelectAll()"> 全选</label>
      <button class="batch-btn" id="batchDeleteBtn" disabled>批量删除</button>
      <span class="selected-count" id="selectedCount">已选择 0 条</span>
      <div class="auto-refresh">
        <label><input type="checkbox" id="autoRefresh"> 自动刷新</label>
        <select id="refreshInterval">
          <option value="5">5秒</option>
          <option value="10" selected>10秒</option>
          <option value="30">30秒</option>
          <option value="60">60秒</option>
        </select>
      </div>
    </div>
    
    <div class="pagination-controls">
      <div class="page-size">
        <label>每页显示:</label>
        <input type="number" id="pageSize" min="1" max="100" value="25">
        <button onclick="AppUtils.applyPageSize(parseInt(document.getElementById('pageSize').value), loadTableData)">应用</button>
      </div>
      <div class="page-nav">
        <button onclick="AppUtils.prevPage(loadTableData)" id="prevPage" disabled>上一页</button>
        <span id="pageInfo">第 1 页 / 共 0 页</span>
        <button onclick="AppUtils.nextPage(loadTableData)" id="nextPage" disabled>下一页</button>
      </div>
    </div>
    
    <table>
      <thead>
        <tr>
          <th></th>
          <th>ID</th>
          <th>用户IP</th>
          <th>网页域名</th>
          <th>网页路径</th>
          <th>用户端时间</th>
          <th>服务器时间</th>
          <th>统计时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="9" style="text-align:center">暂无数据</td></tr>
      </tbody>
    </table>
  </div>
  
  <!-- IP信息模态框 -->
  <div id="ipModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>IP信息查询</h3>
        <span class="close" onclick="AppUtils.closeIpModal()">&times;</span>
      </div>
      <div class="modal-body" id="ipModalContent">
        <p>正在查询...</p>
      </div>
    </div>
  </div>
  
  <script src="common.js"></script>
  <script>
    function loadTableData() {
      const state = AppUtils.getPaginationState();
      fetch(`/api/getStatistics?page=${state.page}&pageSize=${state.pageSize}`)
        .then(response => response.json())
        .then(data => {
          if (data.code === 0) {
            renderTable(data.data);
            AppUtils.updatePagination(
              data.pagination,
              document.getElementById('count'),
              document.getElementById('pageInfo'),
              document.getElementById('prevPage'),
              document.getElementById('nextPage')
            );
          } else {
            window.location.href = '/login';
          }
        })
        .catch(error => {
          console.error('获取数据失败:', error);
          window.location.href = '/login';
        });
    }
    
    function renderTable(rows) {
      const tableBody = document.getElementById('tableBody');
      
      if (rows.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="9" style="text-align:center">暂无数据</td></tr>';
        return;
      }
      
      const tableRows = rows.map(row => {
        return `
          <tr>
            <td><input type="checkbox" class="row-checkbox" data-id="${row.id}" onclick="AppUtils.toggleRowSelect(${row.id})"></td>
            <td>${row.id}</td>
            <td>
              ${row.ip || '-'}
              ${row.ip ? `<button class="query-ip-btn" data-ip="${row.ip}" style="margin-left:8px">查询</button>` : ''}
            </td>
            <td>${row.url || '-'}</td>
            <td>${row.path || '-'}</td>
            <td>${AppUtils.formatTime(row.client_time)}</td>
            <td>${AppUtils.formatTime(row.server_time)}</td>
            <td>${AppUtils.formatTime(row.statistics_time)}</td>
            <td><button class="delete-btn" data-id="${row.id}">删除</button></td>
          </tr>
        `;
      }).join('');
      
      tableBody.innerHTML = tableRows;
      
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          const id = parseInt(this.dataset.id);
          AppUtils.handleDelete(id, e, loadTableData);
        });
      });
      
      document.querySelectorAll('.query-ip-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const ip = this.dataset.ip;
          AppUtils.queryIp(ip);
        });
      });
    }
    
    // 点击模态框外部关闭
    window.onclick = function(event) {
      const modal = document.getElementById('ipModal');
      if (event.target === modal) {
        AppUtils.closeIpModal();
      }
    }
    
    document.getElementById('pageSize').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') AppUtils.applyPageSize(parseInt(this.value), loadTableData);
    });
    
    document.addEventListener('DOMContentLoaded', function() {
      AppUtils.initTheme();
      AppUtils.renderNavigation();
      loadTableData();
      AppUtils.setupAutoRefresh(loadTableData);
      
      // 批量删除按钮事件
      document.getElementById('batchDeleteBtn').addEventListener('click', function(e) {
        AppUtils.handleBatchDelete(e.shiftKey, loadTableData);
      });
    });
  </script>
</body>
</html>
