<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>操作日志 - WebsiteStatistics</title>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/EndlessPixel/Tip@main/1.0/tip.css">
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
</head>
<body class="bg-gray-100 dark:bg-neutral-950 text-gray-900 dark:text-white">
  
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <h1 class="text-2xl font-bold mb-6"><i data-feather="file-text" class="inline-block w-7 h-7 align-[-4px] mr-2"></i>操作日志</h1>
    
    <div class="bg-white dark:bg-neutral-900 rounded-xl shadow-sm border border-gray-200 dark:border-neutral-800 p-4 mb-4 flex flex-wrap items-center gap-4">
      <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
        <input type="checkbox" id="autoRefresh" class="w-4 h-4 rounded border-gray-300 dark:border-gray-600 text-blue-600">
        <span><i data-feather="refresh-cw" class="inline-block w-4 h-4 align-[-2px] mr-1"></i>自动刷新</span>
      </label>
      <div class="flex items-center gap-2 text-sm text-gray-600 dark:text-gray-400">
        <span>间隔:</span>
        <select id="refreshInterval" class="px-2 py-1 border border-gray-200 dark:border-gray-700 rounded-lg bg-white dark:bg-neutral-800 text-gray-900 dark:text-white text-sm">
          <option value="30">30秒</option>
          <option value="60" selected>1分钟</option>
          <option value="300">5分钟</option>
        </select>
      </div>
    </div>
    
    <div class="bg-white dark:bg-neutral-900 rounded-xl shadow-sm border border-gray-200 dark:border-neutral-800 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="bg-gray-50 dark:bg-neutral-800">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase"><i data-feather="clock" class="inline-block w-3 h-3 align-[-1px] mr-1"></i>时间</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase"><i data-feather="tag" class="inline-block w-3 h-3 align-[-1px] mr-1"></i>操作类型</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase"><i data-feather="hash" class="inline-block w-3 h-3 align-[-1px] mr-1"></i>会话ID</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase"><i data-feather="globe" class="inline-block w-3 h-3 align-[-1px] mr-1"></i>IP地址</th>
            </tr>
          </thead>
          <tbody id="logsContainer" class="divide-y divide-gray-200 dark:divide-neutral-800">
            <tr><td colspan="4" class="px-4 py-8 text-center text-gray-500 dark:text-gray-400">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
    
    <div id="pagination" class="mt-4 flex flex-wrap items-center justify-between gap-4">
      <div class="text-sm text-gray-500 dark:text-gray-400">
        <i data-feather="list" class="inline-block w-4 h-4 align-[-2px] mr-1"></i>共 <span id="totalRecords">0</span> 条记录，当前第 <span id="currentPage">1</span> / <span id="totalPages">1</span> 页
      </div>
      <div class="flex items-center gap-2">
        <button onclick="AppUtils.prevPage(loadLogs)" id="prevBtn" disabled class="px-3 py-1 bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-700 rounded-lg text-sm hover:bg-gray-50 dark:hover:bg-neutral-800 disabled:opacity-50"><i data-feather="chevron-left" class="inline-block w-4 h-4 align-[-2px] mr-1"></i>上一页</button>
        <button onclick="AppUtils.nextPage(loadLogs)" id="nextBtn" disabled class="px-3 py-1 bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-700 rounded-lg text-sm hover:bg-gray-50 dark:hover:bg-neutral-800 disabled:opacity-50">下一页<i data-feather="chevron-right" class="inline-block w-4 h-4 align-[-2px] ml-1"></i></button>
      </div>
    </div>
  </main>
  
  <script src="common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      AppUtils.initTheme();
      AppUtils.renderNavigationBar();
      AppUtils.renderFooter();
      AppUtils.resetPaginationState();
      const state = AppUtils.getPaginationState();
      state.currentPageSize = 20;
      loadLogs();
      AppUtils.setupAutoRefresh(loadLogs);
      if (window.feather) feather.replace();
    });
    
    async function loadLogs() {
      try {
        const state = AppUtils.getPaginationState();
        const response = await fetch(`/api/logs?page=${state.currentPage}&pageSize=${state.currentPageSize}`);
        const data = await response.json();
        
        if (data.code === 0) {
          renderLogs(data.data.logs);
          updatePagination(data.pagination);
        }
      } catch (error) {
        console.error('获取日志失败:', error);
        document.getElementById('logsContainer').innerHTML = '<tr><td colspan="4" class="px-4 py-8 text-center text-red-500">加载失败</td></tr>';
      }
    }
    
    function renderLogs(logs) {
      const container = document.getElementById('logsContainer');
      if (!logs || logs.length === 0) {
        container.innerHTML = '<tr><td colspan="4" class="px-4 py-8 text-center text-gray-500 dark:text-gray-400">暂无日志</td></tr>';
        return;
      }
      
      container.innerHTML = logs.map(log => {
        const actionLabels = {
          'login': { text: '登录', bg: 'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400' },
          'logout': { text: '退出', bg: 'bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-400' },
          'delete': { text: '删除', bg: 'bg-orange-100 dark:bg-orange-900/30 text-orange-700 dark:text-orange-400' },
          'force_delete': { text: '强制删除', bg: 'bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400' },
          'batch_delete': { text: '批量删除', bg: 'bg-orange-100 dark:bg-orange-900/30 text-orange-700 dark:text-orange-400' },
          'force_batch_delete': { text: '强制批量删除', bg: 'bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400' },
          'login_failed': { text: '登录失败', bg: 'bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400' }
        };
        
        const action = actionLabels[log.action] || { text: log.action, bg: 'bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-400' };
        
        return `
          <tr class="hover:bg-gray-50 dark:hover:bg-neutral-800/50 transition-colors">
            <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-400 whitespace-nowrap">${log.created_at || '-'}</td>
            <td class="px-4 py-3">
              <span class="${action.bg} px-2 py-0.5 rounded text-xs font-medium">${action.text}</span>
            </td>
            <td class="px-4 py-3 text-sm text-gray-500 dark:text-gray-400 font-mono text-xs">${log.session_id || '-'}</td>
            <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-400">${log.ip || '-'}</td>
          </tr>
        `;
      }).join('');
    }
    
    function updatePagination(pagination) {
      AppUtils.updatePagination(
        pagination,
        document.getElementById('totalRecords'),
        null,
        document.getElementById('prevBtn'),
        document.getElementById('nextBtn')
      );
      document.getElementById('currentPage').textContent = pagination.page;
      document.getElementById('totalPages').textContent = pagination.totalPages;
    }
  </script>
  <script src="https://cdn.jsdelivr.net/gh/EndlessPixel/Tip@main/1.0/tip.js"></script>
</body>
</html>
