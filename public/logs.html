<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>操作日志 - 网页访问统计</title>
  <script>
    // 防止深色模式闪烁 - 在页面渲染前执行
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            accent: '#007aff',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif; }
    .nav-active {
      background: rgba(0, 122, 255, 0.1);
      color: #007aff;
    }
    .dark .nav-active {
      background: rgba(10, 132, 255, 0.15);
      color: #0a84ff;
    }
    .op-login { background: rgba(52, 199, 89, 0.15); color: #34c759; }
    .op-login_failed { background: rgba(255, 59, 48, 0.15); color: #ff3b30; }
    .op-logout { background: rgba(142, 142, 147, 0.15); color: #8e8e93; }
    .op-delete, .op-force_delete, .op-batch_delete, .op-force_batch_delete { background: rgba(255, 149, 0, 0.15); color: #ff9500; }
    .dark .op-login { background: rgba(48, 209, 88, 0.2); }
    .dark .op-login_failed { background: rgba(255, 69, 58, 0.2); }
    .dark .op-logout { background: rgba(142, 142, 147, 0.2); }
    .dark .op-delete, .dark .op-force_delete, .dark .op-batch_delete, .dark .op-force_batch_delete { background: rgba(255, 159, 10, 0.2); }
  </style>
</head>
<body class="bg-gray-100 dark:bg-neutral-950 text-gray-900 dark:text-white min-h-screen flex flex-col">
  
  <!-- 主题切换按钮 -->
  <button onclick="AppUtils.toggleTheme()" class="fixed top-4 right-4 z-50 p-2.5 rounded-xl bg-white dark:bg-neutral-800 shadow-lg hover:shadow-xl transition-all border border-gray-200 dark:border-neutral-700">
    <svg id="themeIcon" class="w-5 h-5 text-gray-600 dark:text-gray-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"></circle>
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
    </svg>
  </button>
  
  <!-- 侧边栏 -->
  <aside class="w-60 bg-white dark:bg-neutral-900 border-r border-gray-200 dark:border-neutral-800 flex flex-col h-screen sticky top-0">
    <div class="p-5 border-b border-gray-200 dark:border-neutral-800">
      <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100">统计管理</h2>
    </div>
    <nav class="flex-1 p-3 space-y-1">
      <a href="/overview" class="nav-item block px-4 py-2.5 rounded-lg text-sm font-medium transition-colors text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-neutral-800">数据概览</a>
      <a href="/charts" class="nav-item block px-4 py-2.5 rounded-lg text-sm font-medium transition-colors text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-neutral-800">图表分析</a>
      <a href="/records" class="nav-item block px-4 py-2.5 rounded-lg text-sm font-medium transition-colors text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-neutral-800">访问记录</a>
      <a href="/logs" class="nav-item nav-active block px-4 py-2.5 rounded-lg text-sm font-medium transition-colors">操作日志</a>
      <a href="/api-docs" class="nav-item block px-4 py-2.5 rounded-lg text-sm font-medium transition-colors text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-neutral-800">API文档</a>
    </nav>
    <div class="p-3 border-t border-gray-200 dark:border-neutral-800">
      <a href="/logout" class="block px-4 py-2.5 text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors">退出登录</a>
    </div>
  </aside>
  
  <!-- 主内容区 -->
  <main class="flex-1 p-8 overflow-auto">
    <h1 class="text-2xl font-bold mb-6 text-gray-900 dark:text-white">操作日志</h1>
    
    <!-- 工具栏 -->
    <div class="bg-white dark:bg-neutral-900 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-neutral-800 mb-4 flex items-center justify-between transition-colors">
      <span id="count" class="text-sm text-gray-500 dark:text-gray-400">总记录数: -</span>
      <div class="flex items-center gap-2">
        <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
          <input type="checkbox" id="autoRefresh" checked class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500 dark:border-gray-600">
          <span>自动刷新</span>
        </label>
        <select id="refreshInterval" class="px-3 py-1.5 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-neutral-800 text-sm text-gray-700 dark:text-gray-300">
          <option value="5">5秒</option>
          <option value="10" selected>10秒</option>
          <option value="30">30秒</option>
          <option value="60">60秒</option>
        </select>
      </div>
    </div>
    
    <!-- 分页控制 -->
    <div class="bg-white dark:bg-neutral-900 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-neutral-800 mb-4 flex items-center justify-between transition-colors">
      <div class="flex items-center gap-2">
        <span class="text-sm text-gray-600 dark:text-gray-400">每页显示:</span>
        <input type="number" id="pageSize" min="1" max="100" value="25" class="w-20 px-2 py-1 border border-gray-200 dark:border-gray-700 rounded-lg bg-white dark:bg-neutral-800 text-sm text-gray-700 dark:text-gray-300">
        <button onclick="AppUtils.applyPageSize(parseInt(document.getElementById('pageSize').value), loadLogs)" class="px-3 py-1 bg-blue-600 hover:bg-blue-700 text-white text-sm rounded-lg transition-colors">应用</button>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="AppUtils.prevPage(loadLogs)" id="prevPage" disabled class="px-4 py-2 bg-gray-100 dark:bg-neutral-800 hover:bg-gray-200 dark:hover:bg-neutral-700 disabled:opacity-50 disabled:cursor-not-allowed text-sm rounded-lg transition-colors text-gray-700 dark:text-gray-300">上一页</button>
        <span id="pageInfo" class="text-sm text-gray-600 dark:text-gray-400">第 1 页 / 共 0 页</span>
        <button onclick="AppUtils.nextPage(loadLogs)" id="nextPage" disabled class="px-4 py-2 bg-gray-100 dark:bg-neutral-800 hover:bg-gray-200 dark:hover:bg-neutral-700 disabled:opacity-50 disabled:cursor-not-allowed text-sm rounded-lg transition-colors text-gray-700 dark:text-gray-300">下一页</button>
      </div>
    </div>
    
    <!-- 日志表 -->
    <div class="bg-white dark:bg-neutral-900 rounded-xl shadow-sm border border-gray-200 dark:border-neutral-800 overflow-hidden transition-colors">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 dark:bg-neutral-800">
            <tr>
              <th class="px-4 py-3 text-left font-medium text-gray-600 dark:text-gray-300">ID</th>
              <th class="px-4 py-3 text-left font-medium text-gray-600 dark:text-gray-300">操作类型</th>
              <th class="px-4 py-3 text-left font-medium text-gray-600 dark:text-gray-300">目标ID</th>
              <th class="px-4 py-3 text-left font-medium text-gray-600 dark:text-gray-300">会话ID</th>
              <th class="px-4 py-3 text-left font-medium text-gray-600 dark:text-gray-300">客户端IP</th>
              <th class="px-4 py-3 text-left font-medium text-gray-600 dark:text-gray-300">操作时间</th>
            </tr>
          </thead>
          <tbody id="tableBody" class="divide-y divide-gray-100 dark:divide-neutral-800">
            <tr><td colspan="6" class="px-4 py-8 text-center text-gray-500 dark:text-gray-400">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
  
  <!-- Footer -->
  <footer class="site-footer bg-white dark:bg-neutral-900 py-4 px-6 mt-auto">
    <div class="flex flex-wrap items-center justify-center gap-4 text-sm text-gray-500 dark:text-gray-400">
      <span>© 2026 EndlessPixel Studio. All rights reserved.</span>
      <span class="hidden sm:inline">|</span>
      <a href="https://github.com/EndlessPixel/website-statistics" target="_blank" class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors">GitHub</a>
      <span class="hidden sm:inline">|</span>
      <a href="/LICENSE" target="_blank" class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors">MIT License</a>
    </div>
  </footer>
  
  <script src="common.js"></script>
  <script>
    function getOperationTypeName(type) {
      const types = {
        'login': '登录成功',
        'login_failed': '登录失败',
        'logout': '登出',
        'delete': '删除记录',
        'force_delete': '强制删除',
        'batch_delete': '批量删除',
        'force_batch_delete': '强制批量删除'
      };
      return types[type] || type;
    }
    
    function loadLogs() {
      const state = AppUtils.getPaginationState();
      fetch(`/api/logs?page=${state.page}&pageSize=${state.pageSize}`)
        .then(response => response.json())
        .then(data => {
          if (data.code === 0) {
            renderTable(data.data);
            if (data.pagination) {
              AppUtils.updatePagination(
                data.pagination,
                document.getElementById('count'),
                document.getElementById('pageInfo'),
                document.getElementById('prevPage'),
                document.getElementById('nextPage')
              );
            }
          } else {
            console.error('API error:', data.msg);
          }
        })
        .catch(error => {
          console.error('获取日志失败:', error);
        });
    }
    
    function renderTable(rows) {
      const tableBody = document.getElementById('tableBody');
      
      if (!rows || rows.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-gray-500 dark:text-gray-400">暂无数据</td></tr>';
        return;
      }
      
      const tableRows = rows.map(row => `
        <tr class="hover:bg-gray-50 dark:hover:bg-neutral-800/50 transition-colors">
          <td class="px-4 py-3 font-medium text-gray-900 dark:text-white">${row.id}</td>
          <td class="px-4 py-3"><span class="op-type op-${row.operation_type} px-2 py-1 rounded text-xs font-medium">${getOperationTypeName(row.operation_type)}</span></td>
          <td class="px-4 py-3 text-gray-900 dark:text-white">${row.target_id || '-'}</td>
          <td class="px-4 py-3 font-mono text-xs text-gray-600 dark:text-gray-400">${row.session_id ? row.session_id.substring(0, 8) + '...' : '-'}</td>
          <td class="px-4 py-3 text-gray-600 dark:text-gray-400">${row.ip || '-'}</td>
          <td class="px-4 py-3 whitespace-nowrap text-gray-600 dark:text-gray-400">${AppUtils.formatTime(row.created_at)}</td>
        </tr>
      `).join('');
      
      tableBody.innerHTML = tableRows;
    }
    
    document.addEventListener('DOMContentLoaded', function() {
      AppUtils.initTheme();
      AppUtils.renderNavigation();
      AppUtils.renderFooter();
      AppUtils.resetPaginationState();
      loadLogs();
      AppUtils.setupAutoRefresh(loadLogs);
    });
  </script>
</body>
</html>
