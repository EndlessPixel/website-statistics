<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>操作日志 - 网页访问统计</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()">
    <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"></circle>
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
    </svg>
    <span id="themeText">深色模式</span>
  </button>
  
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>统计管理</h2>
    </div>
    <div class="sidebar-nav">
      <button class="nav-item" onclick="location.href='/overview'">数据概览</button>
      <button class="nav-item" onclick="location.href='/charts'">图表分析</button>
      <button class="nav-item" onclick="location.href='/records'">访问记录</button>
      <button class="nav-item active" onclick="location.href='/logs'">操作日志</button>
      <button class="nav-item" onclick="location.href='/api-docs'">API文档</button>
    </div>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="location.href='/logout'">退出登录</button>
    </div>
  </div>
  
  <div class="main-content">
    <h1>操作日志</h1>
    <div class="logs-header">
      <span class="count" id="count">总记录数: 0</span>
      <div class="auto-refresh">
        <label><input type="checkbox" id="autoRefresh" checked> 自动刷新</label>
        <select id="refreshInterval">
          <option value="5">5秒</option>
          <option value="10" selected>10秒</option>
          <option value="30">30秒</option>
          <option value="60">60秒</option>
        </select>
      </div>
    </div>
    
    <div class="pagination-controls">
      <div class="page-size">
        <label>每页显示:</label>
        <input type="number" id="pageSize" min="1" max="100" value="25">
        <button onclick="applyPageSize()">应用</button>
      </div>
      <div class="page-nav">
        <button onclick="prevPage()" id="prevPage" disabled>上一页</button>
        <span id="pageInfo">第 1 页 / 共 0 页</span>
        <button onclick="nextPage()" id="nextPage" disabled>下一页</button>
      </div>
    </div>
    
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>操作类型</th>
          <th>目标ID</th>
          <th>会话ID</th>
          <th>客户端IP</th>
          <th>操作时间</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="6" style="text-align:center">暂无数据</td></tr>
      </tbody>
    </table>
  </div>
  
  <script>
    // 主题切换
    function toggleTheme() {
      const body = document.body;
      const isDark = body.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      updateThemeUI(isDark);
    }
    
    function updateThemeUI(isDark) {
      const icon = document.getElementById('themeIcon');
      const text = document.getElementById('themeText');
      
      if (isDark) {
        icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
        text.textContent = '浅色模式';
      } else {
        icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>';
        text.textContent = '深色模式';
      }
    }
    
    function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);
      
      if (isDark) {
        document.body.classList.add('dark');
      }
      updateThemeUI(isDark);
    }
    
    let currentPage = 1;
    let currentPageSize = 25;
    let totalPages = 0;
    let refreshTimer = null;
    
    function getOperationTypeName(type) {
      const types = {
        'login': '登录成功',
        'login_failed': '登录失败',
        'logout': '登出',
        'delete': '删除记录',
        'force_delete': '强制删除',
        'batch_delete': '批量删除',
        'force_batch_delete': '强制批量删除'
      };
      return types[type] || type;
    }
    
    function formatTime(timeStr) {
      const date = new Date(timeStr);
      return date.toLocaleString('zh-CN');
    }
    
    function applyPageSize() {
      const newSize = parseInt(document.getElementById('pageSize').value);
      if (newSize >= 1 && newSize <= 100) {
        currentPageSize = newSize;
        currentPage = 1;
        loadLogs();
      } else {
        alert('每页数量必须在1-100之间');
      }
    }
    
    function prevPage() {
      if (currentPage > 1) {
        currentPage--;
        loadLogs();
      }
    }
    
    function nextPage() {
      if (currentPage < totalPages) {
        currentPage++;
        loadLogs();
      }
    }
    
    function loadLogs() {
      fetch(`/api/logs?page=${currentPage}&pageSize=${currentPageSize}`)
        .then(response => response.json())
        .then(data => {
          if (data.code === 0) {
            renderTable(data.data);
            if (data.pagination) {
              updatePagination(data.pagination);
            }
          } else {
            console.error('API error:', data.msg);
          }
        })
        .catch(error => {
          console.error('获取日志失败:', error);
        });
    }
    
    function renderTable(rows) {
      const tableBody = document.getElementById('tableBody');
      
      if (rows.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center">暂无数据</td></tr>';
        return;
      }
      
      const tableRows = rows.map(row => `
        <tr>
          <td>${row.id}</td>
          <td><span class="op-type op-${row.operation_type}">${getOperationTypeName(row.operation_type)}</span></td>
          <td>${row.target_id || '-'}</td>
          <td>${row.session_id ? row.session_id.substring(0, 8) + '...' : '-'}</td>
          <td>${row.ip || '-'}</td>
          <td>${formatTime(row.created_at)}</td>
        </tr>
      `).join('');
      
      tableBody.innerHTML = tableRows;
    }
    
    function updatePagination(pagination) {
      totalPages = pagination.totalPages;
      document.getElementById('count').textContent = '总记录数: ' + pagination.total;
      document.getElementById('pageInfo').textContent = `第 ${pagination.page} 页 / 共 ${pagination.totalPages} 页`;
      document.getElementById('prevPage').disabled = pagination.page <= 1;
      document.getElementById('nextPage').disabled = pagination.page >= pagination.totalPages;
    }
    
    function setupAutoRefresh() {
      const autoRefresh = document.getElementById('autoRefresh').checked;
      const interval = parseInt(document.getElementById('refreshInterval').value) * 1000;
      
      if (refreshTimer) {
        clearInterval(refreshTimer);
        refreshTimer = null;
      }
      
      if (autoRefresh) {
        refreshTimer = setInterval(loadLogs, interval);
      }
    }
    
    document.getElementById('autoRefresh').addEventListener('change', setupAutoRefresh);
    document.getElementById('refreshInterval').addEventListener('change', setupAutoRefresh);
    
    document.addEventListener('DOMContentLoaded', function() {
      initTheme();
      loadLogs();
      setupAutoRefresh();
    });
  </script>
</body>
</html>
