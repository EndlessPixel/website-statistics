<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>版本管理 - WebsiteStatistics</title>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-gray-100 dark:bg-neutral-950 text-gray-900 dark:text-white">
  
  <nav class="bg-white dark:bg-neutral-900 border-b border-gray-200 dark:border-neutral-800 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-8">
          <h1 class="text-lg font-semibold text-gray-800 dark:text-gray-100">WebsiteStatistics</h1>
          <div class="hidden md:flex items-center gap-1">
            <a href="/overview" class="nav-item px-4 py-2 rounded-lg text-sm font-medium transition-colors text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-neutral-800">数据概览</a>
            <a href="/charts" class="nav-item px-4 py-2 rounded-lg text-sm font-medium transition-colors text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-neutral-800">图表分析</a>
            <a href="/records" class="nav-item px-4 py-2 rounded-lg text-sm font-medium transition-colors text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-neutral-800">访问记录</a>
            <a href="/logs" class="nav-item px-4 py-2 rounded-lg text-sm font-medium transition-colors text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-neutral-800">操作日志</a>
            <a href="/api-docs" class="nav-item px-4 py-2 rounded-lg text-sm font-medium transition-colors text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-neutral-800">API文档</a>
            <a href="/repo" class="nav-item px-4 py-2 rounded-lg text-sm font-medium transition-colors text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-neutral-800">仓库信息</a>
            <a href="/version" class="nav-item nav-active px-4 py-2 rounded-lg text-sm font-medium transition-colors">版本管理</a>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <button onclick="AppUtils.toggleTheme()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
            <svg class="w-5 h-5 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="5"></circle>
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
            </svg>
          </button>
          <a href="/logout" class="text-sm text-red-600 dark:text-red-400 hover:text-red-700">退出</a>
        </div>
      </div>
    </div>
  </nav>
  
  <main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <h1 class="text-2xl font-bold mb-6">版本管理</h1>
    
    <!-- 环境检查 -->
    <div id="envCheck" class="bg-white dark:bg-neutral-900 rounded-xl shadow-sm border border-gray-200 dark:border-neutral-800 p-6 mb-6">
      <h2 class="text-lg font-semibold mb-4">环境检查</h2>
      <div id="envItems" class="space-y-3">
        <div class="flex items-center gap-3">
          <div id="envGitDir" class="w-5 h-5 rounded-full flex items-center justify-center">⏳</div>
          <span>.git 目录存在</span>
        </div>
        <div class="flex items-center gap-3">
          <div id="envGitCmd" class="w-5 h-5 rounded-full flex items-center justify-center">⏳</div>
          <span>Git 命令行工具已安装</span>
        </div>
        <div class="flex items-center gap-3">
          <div id="envRemote" class="w-5 h-5 rounded-full flex items-center justify-center">⏳</div>
          <span>Git 远程仓库已配置</span>
        </div>
      </div>
    </div>
    
    <!-- 版本状态 -->
    <div id="versionCard" class="bg-white dark:bg-neutral-900 rounded-xl shadow-sm border border-gray-200 dark:border-neutral-800 p-6 mb-6">
      <div id="versionContent">
        <div class="text-center py-8">
          <div class="text-gray-500 dark:text-gray-400">加载中...</div>
        </div>
      </div>
    </div>
    
    <!-- 刷新按钮 -->
    <div class="text-center">
      <button onclick="refreshVersion()" id="refreshBtn" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors disabled:opacity-50">
        刷新版本信息
      </button>
    </div>
  </main>
  
  <script src="common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      AppUtils.initTheme();
      AppUtils.renderFooter();
      checkEnvAndLoad();
    });
    
    async function checkEnvAndLoad() {
      document.getElementById('refreshBtn').disabled = true;
      
      try {
        const response = await fetch('/api/version');
        const data = await response.json();
        
        // 更新环境检查
        updateEnvCheck(data.env || {});
        
        // 更新版本信息
        if (data.code === 0 && data.data) {
          renderVersionInfo(data.data);
        } else if (data.code === -1) {
          showEnvError(data.data?.errors || []);
        } else {
          showError(data.msg || '获取版本信息失败');
        }
      } catch (error) {
        console.error('获取版本信息失败:', error);
        showError('网络请求失败');
      }
      
      document.getElementById('refreshBtn').disabled = false;
    }
    
    function updateEnvCheck(env) {
      const items = [
        { id: 'envGitDir', passed: env.hasGitDir, text: '.git 目录存在' },
        { id: 'envGitCmd', passed: env.hasGitCmd, text: 'Git 命令行工具已安装' },
        { id: 'envRemote', passed: env.hasRemote, text: 'Git 远程仓库已配置' }
      ];
      
      items.forEach(item => {
        const el = document.getElementById(item.id);
        if (item.passed) {
          el.className = 'w-5 h-5 rounded-full bg-green-500 flex items-center justify-center text-white text-xs';
          el.textContent = '✓';
        } else {
          el.className = 'w-5 h-5 rounded-full bg-red-500 flex items-center justify-center text-white text-xs';
          el.textContent = '✗';
        }
      });
    }
    
    function renderVersionInfo(info) {
      const statusClass = info.ahead <= 0 
        ? 'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400'
        : 'bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-400';
      
      const statusText = info.ahead <= 0 ? '当前已是最新版本' : `落后 ${info.ahead} 个版本`;
      
      document.getElementById('versionContent').innerHTML = `
        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <div class="text-sm text-gray-500 dark:text-gray-400 mb-1">本地 Commit SHA</div>
              <div class="font-mono text-sm bg-gray-100 dark:bg-neutral-800 px-3 py-2 rounded-lg truncate">${info.localSha || '-'}</div>
            </div>
            <div>
              <div class="text-sm text-gray-500 dark:text-gray-400 mb-1">远程最新 Commit SHA</div>
              <div class="font-mono text-sm bg-gray-100 dark:bg-neutral-800 px-3 py-2 rounded-lg truncate">${info.remoteSha || '-'}</div>
            </div>
          </div>
          <div class="text-center">
            <span class="inline-block px-4 py-2 rounded-full ${statusClass} font-medium">
              ${statusText}
            </span>
          </div>
        </div>
      `;
    }
    
    function showEnvError(errors) {
      let errorMsg = '当前环境不满足，无法使用此功能';
      if (errors.length > 0) {
        errorMsg += '：<br>' + errors.map(e => '• ' + e).join('<br>');
      }
      document.getElementById('versionContent').innerHTML = `
        <div class="text-center py-8">
          <div class="text-red-500 dark:text-red-400 mb-2">⚠️</div>
          <div class="text-red-600 dark:text-red-400">${errorMsg}</div>
        </div>
      `;
    }
    
    function showError(msg) {
      document.getElementById('versionContent').innerHTML = `
        <div class="text-center py-8">
          <div class="text-gray-500 dark:text-gray-400">${msg}</div>
        </div>
      `;
    }
    
    function refreshVersion() {
      checkEnvAndLoad();
    }
  </script>
</body>
</html>
